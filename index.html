<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machou Fitness</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
overflow:hidden;
}

/* VIDEO BACKGROUND */

.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
overflow:hidden;
}

.video-bg video{
width:100%;
height:100%;
object-fit:cover;
object-position:center 35%;
filter:brightness(0.7) contrast(1.1);
}

/* DARK OVERLAY */

.overlay{
position:relative;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:rgba(0,0,0,0.5);
color:white;
}

/* LOGO */

.logo{
font-size:50px;
font-weight:900;
letter-spacing:3px;
margin-bottom:30px;
text-shadow:0 0 20px red;
}

/* BUTTON */

.join-btn{
padding:18px 50px;
font-size:20px;
border:none;
background:#ff0000;
color:white;
cursor:pointer;
border-radius:50px;
transition:0.3s;
font-weight:bold;
}

.join-btn:hover{
background:white;
color:red;
transform:scale(1.05);
}

/* MOBILE */

@media(max-width:768px){
.logo{
font-size:32px;
}
.join-btn{
padding:14px 35px;
font-size:16px;
}
}

</style>
</head>

<body>

<div class="video-bg">
<video autoplay muted loop playsinline>
<source src="teste video 1.mp4" type="video/mp4">
</video>
</div>

<div class="overlay">
<div class="logo">MACHOU FITNESS</div>
<button class="join-btn" onclick="location.href='join.html'">
JOIN US
</button>
</div>

</body>
</html>
