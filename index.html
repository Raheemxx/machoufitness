<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machou Fitness</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

html, body{
height:100%;
overflow:hidden;
}

/* VIDEO BACKGROUND */

.video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
display:flex;
justify-content:center;
align-items:center;
background:black;
}

.video-bg video{
max-width:100%;
max-height:100%;
object-fit:contain;
}

/* DARK OVERLAY */

.content{
position:relative;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
text-align:center;
background:rgba(0,0,0,0.5);
}

/* LOGO */

.logo{
font-size:40px;
font-weight:bold;
margin-bottom:20px;
letter-spacing:2px;
}

/* BUTTON */

.join-btn{
padding:15px 40px;
font-size:20px;
border:none;
background:red;
color:white;
cursor:pointer;
border-radius:30px;
transition:0.3s ease;
}

.join-btn:hover{
background:white;
color:red;
}

</style>

</head>

<body>

<div class="video-bg">
<video autoplay muted loop playsinline>
<source src="teste video 1.mp4" type="video/mp4">
</video>
</div>

<div class="content">
<div class="logo">MACHOU FITNESS</div>

<button class="join-btn" onclick="location.href='join.html'">
JOIN US
</button>
</div>

</body>
</html>
