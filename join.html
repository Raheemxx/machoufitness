<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Machou Fitness</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
background:url("WhatsApp Image 2026-02-25 at 1.57.38 PM.jpeg");
background-size:cover;
background-position:center;
overflow:hidden;
}

.overlay{
background:linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9));
width:100%;
height:100%;
position:relative;
}

/* COACH */

.coach{
position:absolute;
top:20px;
right:20px;
width:95px;
height:95px;
border-radius:50%;
overflow:hidden;
border:3px solid white;
animation:pulse 2s infinite;
}

.coach img{
width:100%;
height:100%;
object-fit:cover;
}

@keyframes pulse{
0%{box-shadow:0 0 0 0 rgba(0,255,0,0.7);}
70%{box-shadow:0 0 0 15px rgba(0,255,0,0);}
100%{box-shadow:0 0 0 0 rgba(0,255,0,0);}
}

/* ONLINE DOT */

.online-dot{
position:absolute;
bottom:8px;
right:8px;
width:18px;
height:18px;
background:#00ff00;
border-radius:50%;
border:2px solid white;
animation:blink 1.5s infinite;
}

@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0.4;}
}

/* PROMO */

.promo{
position:absolute;
top:45%;
left:8%;
color:white;
direction:rtl;
max-width:600px;
}

.promo-text{
font-size:55px;
font-weight:900;
line-height:1.2;
text-shadow:0 0 30px red;
}

.arrow{
position:absolute;
top:-20px;
right:-120px;
font-size:50px;
animation:moveArrow 1s linear infinite;
transform:rotate(-35deg);
}

@keyframes moveArrow{
0%{transform:translate(0,0) rotate(-35deg);}
50%{transform:translate(25px,-15px) rotate(-35deg);}
100%{transform:translate(0,0) rotate(-35deg);}
}

/* ICONS */

.icons{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:30px;
}

.icon{
width:65px;
height:65px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
transition:0.3s;
}

.icon:hover{
transform:scale(1.2);
}

/* MOBILE */

@media(max-width:768px){
.promo-text{
font-size:34px;
}
.arrow{
right:-80px;
font-size:35px;
}
.coach{
width:75px;
height:75px;
}
.icon{
width:55px;
height:55px;
}
}

</style>
</head>

<body>

<div class="overlay">

<a href="https://wa.me/212699078410">
<div class="coach">
<img src="coach.JPG">
<div class="online-dot"></div>
</div>
</a>

<div class="promo">
<div class="promo-text">
يالاه البطل/بطلة !<br>
تريني معانا
</div>
<div class="arrow">➜➜➜</div>
</div>

<div class="icons">

<a href="https://www.tiktok.com/@machoufitness">
<div class="icon">
<img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png" width="30">
</div>
</a>

<a href="https://www.instagram.com/adra_fitt/">
<div class="icon">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" width="30">
</div>
</a>

<a href="https://wa.me/212699078410">
<div class="icon">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="30">
</div>
</a>

</div>

</div>

</body>
</html>
