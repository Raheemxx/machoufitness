<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Join Machou Fitness</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
background:url("WhatsApp Image 2026-02-25 at 1.57.38 PM.jpeg");
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* DARK OVERLAY */

.overlay{
background:linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.9));
width:100%;
height:100%;
position:relative;
}

/* ================= COACH ================= */

.coach{
position:absolute;
top:20px;
right:20px;
width:95px;
height:95px;
border-radius:50%;
overflow:hidden;
border:3px solid white;
cursor:pointer;
animation:pulse 2s infinite;
transition:0.3s;
}

.coach:hover{
transform:scale(1.1);
}

.coach img{
width:100%;
height:100%;
object-fit:cover;
}

/* Pulse Glow */

@keyframes pulse{
0%{
box-shadow:0 0 0 0 rgba(0,255,0,0.7);
}
70%{
box-shadow:0 0 0 15px rgba(0,255,0,0);
}
100%{
box-shadow:0 0 0 0 rgba(0,255,0,0);
}
}

/* ONLINE DOT */

.online-dot{
position:absolute;
bottom:8px;
right:8px;
width:18px;
height:18px;
background:#00ff00;
border-radius:50%;
border:2px solid white;
animation:blink 1.5s infinite;
}

@keyframes blink{
0%,100%{opacity:1;}
50%{opacity:0.4;}
}

/* ================= PROMO TEXT ================= */

.promo{
position:absolute;
top:45%;
left:8%;
color:white;
direction:rtl;
max-width:600px;
}

.promo-text{
font-size:60px;
font-weight:900;
line-height:1.2;
letter-spacing:1px;
text-shadow:
0 0 10px #ff0000,
0 0 30px #ff0000;
transform:skewX(-5deg);
}

/* DIAGONAL ARROW */

.arrow{
position:absolute;
top:-20px;
right:-120px;
font-size:50px;
animation:moveArrow 1s linear infinite;
transform:rotate(-35deg);
}

/* Arrow running animation */

@keyframes moveArrow{
0%{
transform:translate(0,0) rotate(-35deg);
opacity:1;
}
50%{
transform:translate(25px,-15px) rotate(-35deg);
opacity:0.6;
}
100%{
transform:translate(0,0) rotate(-35deg);
opacity:1;
}
}

/* ================= SOCIAL ICONS ================= */

.icons{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:30px;
}

.icon{
width:65px;
height:65px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
cursor:pointer;
transition:0.3s;
}

.icon:hover{
transform:scale(1.2);
}

/* ================= MOBILE RESPONSIVE ================= */

@media(max-width:768px){

.promo{
top:55%;
left:5%;
}

.promo-text{
font-size:36px;
}

.arrow{
right:-80px;
font-size:35px;
}

.coach{
width:75px;
height:75px;
}

.icon{
width:55px;
height:55px;
}

}

</style>

</head>

<body>

<div class="overlay">

<!-- COACH -->

<a href="https://wa.me/212699078410">
<div class="coach">
<img src="coach.JPG" alt="Coach">
<div class="online-dot"></div>
</div>
</a>

<!-- PROMO -->

<div class="promo">
<div class="promo-text">
يالاه البطل/بطلة !<br>
تريني معانا
</div>
<div class="arrow">➜➜➜</div>
</div>

<!-- SOCIAL ICONS -->

</div>
</a>

<div class="icon">
<img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png" width="30">
</div>
</a>

<div class="icon">
<img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" width="30">
</div>
</a>

</div>

</div>

</body>
</html>
